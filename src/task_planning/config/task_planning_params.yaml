# YOLO 类别 ID → 方块类型映射
block_classes:
  large: [0, 2]        # red_large, green_large
  small: [1, 3]        # red_small, green_small

# 规划策略: small_first | large_first | nearest
planning_strategy: "small_first"

# 同一方块去重的位置容差（米）
proximity_threshold: 0.3

# 累积多少帧检测结果后做一次规划
scan_frames: 5

# 坐标系（检测结果所在帧 / 发布目标所用帧）
camera_frame: "kinect2_rgb_optical_frame"
publish_frame: "base_footprint"
